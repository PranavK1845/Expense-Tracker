{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="{% static 'expensetracker/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

<header class="header">
    <div class="header-top">
        <img src="{% static 'expensetracker/images/logo.png' %}" alt="Logo" class="logo">
        <span class="title">Expense Tracker</span>
    </div>
    <form action="{% url 'logout' %}" method="post" class="logout-form">
    {% csrf_token %}
    <button type="submit" class="logout-btn nav-btn">Logout</button>
</form>

</header>

<div class="button-section">
    <a href="{% url 'add_expense' %}" class="nav-btn">Add Expenses</a>
    <span class="divider">|</span>
    <a href="{% url 'recent_expense' %}" class="nav-btn">Recent Expenses</a>
    <span class="divider">|</span>
    <a href="{% url 'total_expense' period='monthly' %}" class="nav-btn">Total Expenses</a>
</div>

<script src="{% static 'expensetracker/script.js' %}"></script>
</body>
</html>
