{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Expenses</title>
    <link rel="stylesheet" href="{% static 'expensetracker/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<header class="header">
    <div class="header-top">
        <img src="{% static 'expensetracker/images/logo.png' %}" alt="Logo" class="logo">
        <span class="title">Expense Tracker</span>
    </div>
</header>

<div class="container">
    <h2>Last 10 Expenses</h2>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in expenses %}
            <tr>
                <td>{{ expense.date }}</td>
                <td>{{ expense.category }}</td>
                <td>{{ expense.amount }}</td>
                <td>{{ expense.description }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No expenses found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="button-row">
    <button type="button" id="homeBtn">Home</button>
</div>

<script>
    document.getElementById("homeBtn").addEventListener("click", function() {
        window.location.href = "{% url 'index' %}";
    });
</script>



</div>

<script src="{% static 'expensetracker/script.js' %}"></script>
</body>
</html>
