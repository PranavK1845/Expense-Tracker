{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <link rel="stylesheet" href="{% static 'expensetracker/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<header class="header">
    <div class="header-top">
        <img src="{% static 'expensetracker/images/logo.png' %}" alt="Logo" class="logo">
        <span class="title">Expense Tracker</span>
    </div>
</header>

<div class="container">
    <form method="POST">
        {% csrf_token %}
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="expense-list">
                <tr>
                    <td><input type="date" name="date[]"></td>
                    <td>
                        <select name="category[]">
                            <option value="Rent">Rent</option>
                            <option value="Groceries">Groceries</option>
                            <option value="Education">Education</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                        </select>
                    </td>
                    <td><input type="number" name="amount[]" placeholder="Amount"></td>
                    <td><input type="text" name="description[]" placeholder="Description"></td>
                    <td><button type="button" onclick="addRow()">+</button></td>
                </tr>
            </tbody>
        </table>

      <div class="form-button">
    <button type="button" id="homeBtn">Home</button>
    <button type="submit" id="addexpBtn">Add Expense</button>
</div>

<script>
    document.getElementById("homeBtn").addEventListener("click", function() {
        window.location.href = "{% url 'index' %}";
    });
</script>

    </form>
</div>

<script src="{% static 'expensetracker/script.js' %}"></script>
</body>
</html>
